<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PeopleFirst · Print</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  :root {
    --sky: oklch(62% 0.145 236);
    --sky-ink: oklch(36% 0.105 236);
    --sky-light: oklch(95.5% 0.032 236);
    --sky-border: oklch(88% 0.052 236);
    --sky-shadow: oklch(62% 0.145 236 / 0.45);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: oklch(93% .012 264);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    font-family: "JioType Var", system-ui, sans-serif;
  }
  .jds-icon svg { width: 100%; height: 100%; display: block; }

  /* Freeze any animations at their end state */
  *, *::before, *::after {
    animation-delay: -99s !important; animation-duration: .001s !important;
    animation-iteration-count: 1 !important; animation-fill-mode: both !important;
    animation-play-state: running !important; transition-duration: 0s !important;
  }
  .skln { background: var(--surface-subtle) !important; }

  #root { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 28px 16px; }

  .page { width: 460px; max-width: 100%; }
  .page-cap {
    font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--content-minimal); margin: 0 4px 10px; text-align: center;
  }
  .device {
    width: 100%; background: var(--surface-subtle);
    border-radius: 22px; overflow: hidden;
    border: 1px solid var(--stroke-minimal);
    box-shadow: 0 12px 32px -16px rgba(15,23,42,.28);
  }

  @media print {
    body { background: #fff; }
    #root { padding: 0; gap: 0; }
    .page { width: 100%; break-after: page; }
    .page:last-child { break-after: auto; }
    .page-cap { margin-top: 10px; }
    .device { border-radius: 0; border: none; box-shadow: none; }
    section, .device > div { break-inside: avoid; }
  }
  @page { size: portrait; margin: 0.6cm; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="icons-data.js"></script>
<script type="text/babel" src="components.jsx"></script>

</body>
</html>
