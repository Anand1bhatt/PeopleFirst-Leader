<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jio – Experience the Future</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --nav-h:64px;
  --easing:cubic-bezier(0.16,1,0.3,1);
  --easing-in:cubic-bezier(0.4,0,1,1);
}
html{scroll-behavior:smooth;}
body{
  font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  background:#08060f;color:#fff;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── AMBIENT BG ── */
#bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  transition:background 1.5s cubic-bezier(0.4,0,0.2,1);
  background:radial-gradient(ellipse 90% 80% at 25% 50%,rgba(130,0,200,0.42) 0%,transparent 65%),
             radial-gradient(ellipse 70% 60% at 80% 70%,rgba(180,0,130,0.3) 0%,transparent 60%),
             #08060f;
}

/* ── GRAIN ── */
body::after{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  opacity:0.032;mix-blend-mode:overlay;
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 52px;
  background:rgba(8,6,15,0.5);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,0.055);
}
.logo{
  display:flex;align-items:center;gap:10px;text-decoration:none;
}
.logo-mark{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#2060ff,#c030e0);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:0.78rem;color:#fff;
  box-shadow:0 0 18px rgba(150,50,255,0.55);
}
.logo-name{
  font-size:1.3rem;font-weight:800;letter-spacing:-0.03em;color:#fff;
}
.nav-links{display:flex;gap:34px;list-style:none;}
.nav-links a{
  color:rgba(255,255,255,0.62);text-decoration:none;
  font-size:0.88rem;font-weight:500;
  transition:color 0.2s;
}
.nav-links a:hover{color:#fff;}
.nav-end{display:flex;gap:10px;}
.nav-icon{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.65);
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,color 0.2s;
}
.nav-icon:hover{background:rgba(255,255,255,0.14);color:#fff;}
.nav-icon svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}

/* ═══════════════════════════════════
   FOLD 1
═══════════════════════════════════ */
#fold1{
  position:relative;z-index:2;
  height:100vh;min-height:600px;
  padding-top:var(--nav-h);
  display:flex;align-items:stretch;
  overflow:hidden;
}

/* ── STACK RAIL (left) ── */
#stack-rail{
  position:absolute;
  left:0;top:0;bottom:0;
  width:120px;z-index:20;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:0;padding:var(--nav-h) 0 0 0;
  pointer-events:none;
}
.stack-thumb{
  position:absolute;
  width:72px;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
  opacity:0;
  transform:scale(0.6) translateY(60px);
  transition:opacity 0.6s var(--easing),transform 0.8s var(--easing),top 0.6s var(--easing);
}
.stack-thumb.visible{
  opacity:1;
  transform:scale(1) translateY(0) rotate(var(--rot));
}

/* ── MAIN LAYOUT ── */
.fold1-inner{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1.6fr;
  align-items:center;
  padding:0 52px 60px 140px; /* left padding to clear stack rail */
  gap:32px;
}

/* ── LEFT TEXT ── */
.hero-text{
  position:relative;z-index:10;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  padding:5px 14px;border-radius:999px;
  font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;font-weight:700;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  margin-bottom:22px;
  backdrop-filter:blur(8px);
  white-space:nowrap;
  transition:color 0.6s,border-color 0.6s;
}
.eyebrow-dot{
  width:5px;height:5px;border-radius:50%;
  background:currentColor;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(1.5)}}

.hero-title{
  font-size:clamp(2.4rem,4.5vw,4.4rem);
  font-weight:900;line-height:1.06;letter-spacing:-0.04em;
  margin-bottom:20px;
}
/* Fix: gradient words as inline spans with correct clip */
.grad-word{
  display:inline;
  background-clip:text;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
}

.hero-body{
  font-size:1rem;line-height:1.75;
  color:rgba(255,255,255,0.55);
  max-width:390px;margin-bottom:32px;
}
.hero-body strong{color:rgba(255,255,255,0.88);font-weight:600;}
.cta-row{display:flex;gap:12px;flex-wrap:wrap;}
.btn-fill{
  padding:13px 30px;border-radius:999px;border:none;
  font-size:0.9rem;font-weight:700;color:#fff;cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform 0.25s var(--easing),box-shadow 0.25s;
}
.btn-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent 60%);
  opacity:0;transition:opacity 0.3s;
}
.btn-fill:hover{transform:translateY(-2px);}
.btn-fill:hover::after{opacity:1;}
.btn-out{
  padding:13px 30px;border-radius:999px;
  font-size:0.9rem;font-weight:600;color:rgba(255,255,255,0.8);
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);cursor:pointer;
  transition:background 0.25s,color 0.25s;
  backdrop-filter:blur(10px);
}
.btn-out:hover{background:rgba(255,255,255,0.13);color:#fff;}

/* ── RIGHT: BANNER STAGE ── */
.banner-stage{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  height:100%;
}

/* The outer container that clips & handles perspective */
.banner-viewport{
  position:relative;
  width:100%;max-width:700px;
  perspective:1200px;
}

/* ACTIVE BANNER WRAPPER — slides in/out */
.banner-wrap{
  position:relative;
  width:100%;
  transform-origin:left center;
  transition:transform 0.85s var(--easing),opacity 0.6s ease;
}
.banner-wrap.exit-left{
  transform:translateX(-120%) scale(0.55) rotate(-6deg);
  opacity:0;
  pointer-events:none;
}
.banner-wrap.enter-right{
  transform:translateX(80px) scale(0.95);
  opacity:0;
}
.banner-wrap.active{
  transform:translateX(0) scale(1);
  opacity:1;
}

/* ── BANNER CARD GROUP ── */
/* The white rounded rectangle that contains all three cards */
.banner-group{
  background:rgba(30,20,50,0.7);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:28px;
  padding:20px;
  display:flex;
  gap:12px;
  align-items:stretch;
  box-shadow:0 40px 100px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.06);
  backdrop-filter:blur(10px);
  position:relative;overflow:hidden;
  transition:transform 0.15s ease;
}
.banner-group::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%);
  pointer-events:none;border-radius:28px;
}

/* Tilt on hover */
.banner-group:hover{transform:perspective(1000px) rotateY(-3deg) rotateX(1deg) scale(1.01);}

/* poster cards */
.poster{
  border-radius:16px;overflow:hidden;flex:0 0 30%;
  min-height:300px;position:relative;
}
.poster-img{
  width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:14px;
  position:relative;overflow:hidden;
}
.poster-img::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 55%);
}
.poster-meta{position:relative;z-index:2;}
.poster-badge{
  display:inline-block;padding:3px 9px;border-radius:999px;
  font-size:0.58rem;letter-spacing:0.06em;font-weight:700;
  background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.25);
  margin-bottom:6px;
}
.poster-title{font-size:1rem;font-weight:900;letter-spacing:-0.02em;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,0.8);}
.poster-sub{font-size:0.62rem;opacity:0.6;margin-top:2px;}

/* OTT ticket card */
.ott-ticket{
  flex:0 0 38%;
  background:#fff;
  border-radius:18px;
  padding:20px 18px 16px;
  color:#080820;
  position:relative;
  display:flex;flex-direction:column;
  box-shadow:0 8px 30px rgba(0,0,0,0.25);
}
/* ticket punch holes */
.ott-ticket::before,.ott-ticket::after{
  content:'';position:absolute;
  width:26px;height:26px;border-radius:50%;
  background:rgba(30,20,50,0.8);
  top:50%;transform:translateY(-50%);z-index:5;
}
.ott-ticket::before{left:-13px;}
.ott-ticket::after{right:-13px;}

.ott-head{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding-bottom:10px;
  border-bottom:2px dashed rgba(80,50,180,0.2);
}
.ott-dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,#6020d0,#c020c0);}
.ott-label{font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:800;color:#5010b0;}
.ott-body{flex:1;padding:8px 0;text-align:center;}
.ott-old-price{
  font-size:1.4rem;font-weight:800;color:#999;
  text-decoration:line-through;text-decoration-color:#cc0000;
  line-height:1;
}
.ott-worth{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:#aaa;margin:3px 0;}
.ott-for-just{
  display:flex;align-items:center;gap:6px;margin:6px 0;
}
.ott-for-just::before,.ott-for-just::after{content:'';flex:1;height:1px;background:rgba(0,0,0,0.12);}
.ott-for-just span{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:#bbb;}
.ott-price{
  font-size:3.4rem;font-weight:900;letter-spacing:-3px;
  color:#0040c0;line-height:1;
}
.ott-rupee-sym{font-size:1.8rem;vertical-align:top;margin-top:7px;display:inline-block;letter-spacing:0;}
.ott-per-mo{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:#aaa;margin-top:2px;}
.ott-divider{border:none;border-top:1px dashed rgba(0,0,0,0.1);margin:8px 0;}
.ott-chips{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.ott-chip{
  padding:8px 6px;border-radius:10px;text-align:center;
  font-size:0.78rem;font-weight:800;color:#fff;
  background:linear-gradient(135deg,#1a5fff,#0038cc);
}
.ott-apps{
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding-top:8px;border-top:1px solid rgba(0,0,0,0.07);
}
.app-icon-sq{
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;background:#f4f4f8;box-shadow:0 2px 6px rgba(0,0,0,0.1);
  overflow:hidden;
}
.app-more{
  padding:5px 8px;border-radius:8px;
  font-size:0.58rem;font-weight:800;color:#555;
  background:#efefef;text-align:center;line-height:1.3;
  white-space:nowrap;
}

/* apps icons inline */
.yt-icon{background:#fff;}
.jh-icon{background:linear-gradient(135deg,#4020b0,#c030c0);}
.pv-icon{background:#00173d;color:#00a8ff;font-size:0.5rem;font-weight:900;line-height:1.1;text-align:center;padding:3px;}

/* Peek card on right */
.peek-card{
  position:absolute;right:-60px;top:50%;transform:translateY(-50%);
  width:180px;height:85%;
  border-radius:20px;overflow:hidden;
  box-shadow:0 16px 40px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.1);
  opacity:0.5;
  pointer-events:none;
  transition:opacity 0.4s;
}
.banner-viewport:hover .peek-card{opacity:0.7;}

/* ── BOTTOM CONTROLS ── */
.fold1-controls{
  position:absolute;bottom:0;left:0;right:0;
  height:72px;
  display:flex;align-items:center;
  padding:0 52px 0 140px;
  gap:24px;
  background:linear-gradient(to top,rgba(8,6,15,0.7),transparent);
  z-index:20;
}
.prog-bar{
  flex:1;display:flex;gap:10px;
}
.prog-track{
  flex:1;height:2px;border-radius:1px;
  background:rgba(255,255,255,0.15);
  position:relative;overflow:hidden;cursor:pointer;
  transition:height 0.2s;
}
.prog-track:hover{height:3px;}
.prog-fill{
  position:absolute;left:0;top:0;bottom:0;
  width:0%;border-radius:1px;background:#fff;
}
.ctrl-arrows{display:flex;gap:8px;}
.arr-btn{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.7);font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,color 0.2s,transform 0.2s;
  backdrop-filter:blur(8px);
}
.arr-btn:hover{background:rgba(255,255,255,0.14);color:#fff;transform:scale(1.08);}
.slide-count{font-size:0.72rem;color:rgba(255,255,255,0.32);letter-spacing:0.08em;min-width:40px;}

/* scroll hint */
.scroll-hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;
  animation:hint-in 1s 2.5s ease both;
  z-index:25;
}
@keyframes hint-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:0.4;transform:translateX(-50%) translateY(0)}}
.scroll-hint:hover{opacity:0.75 !important;}
.scroll-hint span{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;}
.scroll-mouse-icon{
  width:20px;height:30px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.45);
  display:flex;justify-content:center;padding-top:5px;
}
.scroll-wheel{
  width:2.5px;height:6px;border-radius:2px;
  background:rgba(255,255,255,0.7);
  animation:wheel-scroll 1.6s ease-in-out infinite;
}
@keyframes wheel-scroll{0%,100%{transform:translateY(0);opacity:1}80%{transform:translateY(10px);opacity:0}}

/* ═══════════════════════════════════
   FOLD 2 — RECHARGE
═══════════════════════════════════ */
#fold2{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:80px 52px;
  overflow:hidden;
}
#fold2::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(50,20,100,0.45),transparent 55%);
}
.f2-wrap{width:100%;max-width:860px;position:relative;z-index:1;}
.f2-kicker{
  text-align:center;font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);margin-bottom:10px;
}
.f2-title{
  text-align:center;
  font-size:clamp(2.2rem,4.5vw,3.6rem);
  font-weight:900;letter-spacing:-0.04em;line-height:1.08;
  margin-bottom:48px;
}
.f2-title .grad-word{
  background:linear-gradient(90deg,#60c0ff,#4466ff,#a040ff);
  background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
}

/* tab bar */
.f2-tabs{
  display:flex;gap:5px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:999px;padding:4px;
  margin-bottom:24px;
  backdrop-filter:blur(16px);
}
.f2-tab{
  flex:1;padding:10px 0;border-radius:999px;
  font-size:0.85rem;font-weight:600;cursor:pointer;border:none;
  background:transparent;color:rgba(255,255,255,0.42);
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all 0.3s var(--easing);
}
.f2-tab.on{
  background:rgba(255,255,255,0.1);color:#fff;
  border:1px solid rgba(255,255,255,0.13);
  box-shadow:0 2px 14px rgba(0,0,0,0.3);
}

/* glass card */
.f2-card{
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:28px;
  padding:36px 38px 30px;
  backdrop-filter:blur(24px) saturate(150%);
  -webkit-backdrop-filter:blur(24px) saturate(150%);
  box-shadow:0 40px 100px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.07);
  position:relative;overflow:hidden;
}
.f2-card::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:50%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
}
.inp-row{display:flex;gap:10px;}
.inp-wrap{flex:1;position:relative;}
.inp-pre{
  position:absolute;left:20px;top:50%;transform:translateY(-50%);
  font-size:0.9rem;font-weight:600;color:rgba(255,255,255,0.38);
  pointer-events:none;
}
.inp{
  width:100%;height:54px;
  background:rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:999px;outline:none;
  padding:0 20px 0 58px;
  font-size:0.96rem;color:#fff;font-weight:500;
  transition:border-color 0.3s,box-shadow 0.3s,background 0.3s;
}
.inp::placeholder{color:rgba(255,255,255,0.22);}
.inp:focus{
  border-color:rgba(100,130,255,0.5);
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 0 4px rgba(80,100,255,0.1);
}
.go-btn{
  height:54px;padding:0 32px;border-radius:999px;border:none;
  font-size:0.9rem;font-weight:800;color:#fff;cursor:pointer;
  background:linear-gradient(135deg,#2050de,#7030d0);
  box-shadow:0 6px 26px rgba(40,60,200,0.42);
  position:relative;overflow:hidden;white-space:nowrap;
  transition:transform 0.25s var(--easing),box-shadow 0.25s;
}
.go-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.18),transparent 55%);
  opacity:0;transition:opacity 0.3s;
}
.go-btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(40,60,200,0.58);}
.go-btn:hover::before{opacity:1;}
.q-row{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
.q-chip{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  font-size:0.78rem;color:rgba(255,255,255,0.52);cursor:pointer;
  transition:all 0.22s;backdrop-filter:blur(8px);
}
.q-chip:hover{background:rgba(255,255,255,0.09);color:#fff;border-color:rgba(255,255,255,0.15);}

/* stats */
.f2-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  margin-top:40px;
  border-radius:18px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.025);
  backdrop-filter:blur(14px);
}
.f2-stat{
  padding:24px 16px;text-align:center;
  border-right:1px solid rgba(255,255,255,0.05);
  transition:background 0.25s;
}
.f2-stat:last-child{border:none;}
.f2-stat:hover{background:rgba(255,255,255,0.04);}
.sv{
  font-size:1.8rem;font-weight:900;letter-spacing:-0.04em;
  background:linear-gradient(90deg,#80d0ff,#4488ff);
  background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
}

const BANNER_BUILDERS = [buildBannerOTT, buildBannerFiber, buildBannerLifestyle];
const PEEK_COLORS = [
  'linear-gradient(135deg,#280850,#4a10a0)',
  'linear-gradient(135deg,#001850,#0040c0)',
  'linear-gradient(135deg,#1a1208,#3c2814)',
];
const STACK_COLORS = [
  'linear-gradient(135deg,#3a0070,#9010a0)',
  'linear-gradient(135deg,#001850,#0055e0)',
  'linear-gradient(135deg,#2a1800,#8b4500)',
];

/* ═══════════════════════════════════

═══════════════════════════════════ */
let cur = 0;
let isAnimating = false;
const N = SLIDES.length;
const DURATION = 5500;
let fillInterval = null, fillVal = 0;
const stacked = []; // indices of stacked slides

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
function init(){
  applySlideText(0);

/* ═══════════════════════════════════
   APPLY SLIDE TEXT
═══════════════════════════════════ */
function applySlideText(idx, animate){
  const s = SLIDES[idx];
  // eyebrow
  const ew = document.getElementById('eyebrow');
  const et = document.getElementById('eyebrow-text');
  ew.style.color = s.eyebrowColor;
  ew.style.borderColor = s.eyebrowBorder;
  et.textContent = s.eyebrow;
  // also color the dot
  ew.querySelector('.eyebrow-dot').style.background = s.eyebrowColor;

  // title
  const titleEl = document.getElementById('heroTitle');
  titleEl.innerHTML = s.titleLines.map((line, i) => {
    if(i === s.titleGradLine){
      return `<span class="grad-word" style="background:${s.titleGrad};background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent;">${line}</span>`;
    }
    return `<span style="display:block;">${line}</span>`;
  }).join('');

  // body
  document.getElementById('heroBody').innerHTML = s.body;

  // CTAs
  const ctaMain = document.getElementById('ctaMain');
  ctaMain.textContent = s.cta;
  ctaMain.style.background = s.ctaGrad;
  ctaMain.style.boxShadow = `0 6px 28px ${s.ctaShadow}`;
  document.getElementById('ctaSecond').textContent = s.cta2;

  // ambient bg
  document.getElementById('bg').style.background = s.bg;

  // counter
  document.getElementById('slideCount').textContent = `0${idx+1} / 0${N}`;

  // animate in
  if(animate){
    const ht = document.getElementById('heroText');
    ht.style.transition = 'none';
    ht.style.opacity = '0';
    ht.style.transform = 'translateY(20px)';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        ht.style.transition = 'opacity 0.7s var(--easing), transform 0.8s var(--easing)';
        ht.style.opacity = '1';
        ht.style.transform = 'translateY(0)';
      });
    });
  }
}

/* ═══════════════════════════════════
   TRANSITION TO SLIDE
═══════════════════════════════════ */
function goTo(next, skipPush){
  if(isAnimating) return;
  isAnimating = true;
  clearInterval(fillInterval);
  fillVal = 0;

  const prev = cur;
  const nextIdx = ((next % N) + N) % N;

  // 1. Push prev banner to stack (unless going back)
  if(!skipPush){ pushToStack(prev); }

  // 2. Animate out current banner
  const wrap = document.getElementById('bannerWrap');
  wrap.classList.remove('active');
  wrap.classList.add('exit-left');

  // 3. After exit, swap content + enter
  setTimeout(()=>{
    cur = nextIdx;
    applySlideText(cur, true);

    // new banner HTML
    wrap.className = 'banner-wrap enter-right';
    wrap.innerHTML = BANNER_BUILDERS[cur]();
    bindBannerTilt();

    // update peek
    updatePeek((cur+1) % N);

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        wrap.classList.remove('enter-right');
        wrap.classList.add('active');
      });
    });

    setTimeout(()=>{ isAnimating = false; startFill(); }, 500);
  }, 620);
}

/* ═══════════════════════════════════
   STACK ANIMATION
═══════════════════════════════════ */
function pushToStack(idx){
  const rail = document.getElementById('stack-rail');
  const ROTS = [-5, 5, -3, 4, -4];
  const rot = ROTS[stacked.length % ROTS.length];

  const thumb = document.createElement('div');
  thumb.className = 'stack-thumb';
  thumb.style.setProperty('--rot', `${rot}deg`);
  thumb.style.background = STACK_COLORS[idx];

  // position in stack: each thumb offset slightly
  const stackOffset = stacked.length * 10; // px overlap
  const baseTop = 50; // %
  thumb.style.top = `calc(${baseTop}% - 90px + ${stackOffset}px)`;
  thumb.style.height = '110px';

  // Mini content label
  thumb.innerHTML = `<div style="padding:10px 8px;text-align:center;">
    <div style="font-size:0.55rem;opacity:0.5;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;">0${idx+1}</div>
    <div style="font-size:0.65rem;font-weight:700;opacity:0.8;line-height:1.3;">${['OTT Pass','JioFiber','Jio 5G'][idx]}</div>
  </div>`;

  rail.appendChild(thumb);
  stacked.push(idx);

  // Trigger animation
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ thumb.classList.add('visible'); });
  });
}

/* ═══════════════════════════════════
   PEEK CARD
═══════════════════════════════════ */
function updatePeek(nextIdx){
  const peek = document.getElementById('peekCard');
  peek.style.background = PEEK_COLORS[nextIdx % N];
  peek.innerHTML = `<div style="height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:16px;">
    <div style="font-size:0.6rem;opacity:0.4;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Next</div>
    <div style="font-size:0.85rem;font-weight:700;opacity:0.7;">${['OTT Pass','JioFiber','Jio 5G'][nextIdx % N]}</div>
  </div>`;
}

/* ═══════════════════════════════════
   PROGRESS BAR FILL
═══════════════════════════════════ */
function startFill(){
  clearInterval(fillInterval);
  fillVal = 0;
  const fillEl = document.getElementById(`pf${cur}`);
  // reset all
  for(let i=0;i<N;i++){ document.getElementById(`pf${i}`).style.width='0%'; }

  const step = 100 / (DURATION / 50);
  fillInterval = setInterval(()=>{
    fillVal = Math.min(100, fillVal + step);
    fillEl.style.width = fillVal + '%';
    if(fillVal >= 100){
      clearInterval(fillInterval);
      goTo(cur + 1);
    }
  }, 50);
}

/* ═══════════════════════════════════
   CONTROLS
═══════════════════════════════════ */
function bindControls(){
  document.getElementById('btnNext').addEventListener('click',()=>{
    if(!isAnimating){ clearInterval(fillInterval); goTo(cur+1); }
  });
  document.getElementById('btnPrev').addEventListener('click',()=>{
    if(!isAnimating){ clearInterval(fillInterval); goTo(cur-1, true); }
  });
  document.querySelectorAll('.prog-track').forEach(t=>{
    t.addEventListener('click',()=>{
      const i = +t.dataset.i;
      if(i !== cur && !isAnimating){ clearInterval(fillInterval); goTo(i); }
    });
  });

  // Keyboard
  document.addEventListener('keydown', e=>{
    if(e.key === 'ArrowRight') document.getElementById('btnNext').click();
    if(e.key === 'ArrowLeft')  document.getElementById('btnPrev').click();
  });
}

/* ═══════════════════════════════════
   BANNER TILT
═══════════════════════════════════ */
function bindBannerTilt(){
  const g = document.getElementById('activeBannerGroup');
  if(!g) return;
  g.addEventListener('mousemove', e=>{
    const r = g.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    g.style.transform = `perspective(900px) rotateY(${x*7}deg) rotateX(${-y*5}deg) scale(1.015)`;
    g.style.transition = 'transform 0.08s ease';
  });
  g.addEventListener('mouseleave', ()=>{
    g.style.transform = '';
    g.style.transition = 'transform 0.8s var(--easing)';
  });
  g.addEventListener('mouseenter', ()=>{
    g.style.transition = 'transform 0.08s ease';
  });
}

/* ═══════════════════════════════════
   TABS + INPUT
═══════════════════════════════════ */
function bindTabs(){
  document.querySelectorAll('.f2-tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.f2-tab').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');
      document.getElementById('numInp').placeholder = t.dataset.ph;
      document.getElementById('numInp').value = '';
    });
  });
}
function bindInput(){
  document.getElementById('numInp').addEventListener('input', function(){
    this.value = this.value.replace(/\D/g,'').slice(0,10);
  });
}
function doSubmit(){
  const inp = document.getElementById('numInp');
  const v = inp.value.trim();
  if(!v || v.length < 10){
    inp.style.boxShadow = '0 0 0 3px rgba(255,60,60,0.22)';
    inp.style.borderColor = 'rgba(255,80,80,0.45)';
    setTimeout(()=>{ inp.style.boxShadow=''; inp.style.borderColor=''; },1400);
    inp.focus(); return;
  }
  inp.style.boxShadow = '0 0 0 3px rgba(40,200,100,0.22)';
  inp.style.borderColor = 'rgba(40,200,100,0.45)';
  setTimeout(()=>{ inp.style.boxShadow=''; inp.style.borderColor=''; },1400);
}

init();
</script>
