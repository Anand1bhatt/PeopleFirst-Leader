<title>PeopleFirst · Home (Leader + Employee)</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  :root {
    /* AI-layer accent defaults (Sky / JioCloud) — overridden per-tweak at runtime */
    --sky: oklch(62% 0.145 236);
    --sky-ink: oklch(36% 0.105 236);
    --sky-light: oklch(95.5% 0.032 236);
    --sky-border: oklch(88% 0.052 236);
    --sky-shadow: oklch(62% 0.145 236 / 0.45);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: oklch(93% .012 264);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 28px 16px; min-height: 100vh;
  }
  button { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .jds-icon svg { width: 100%; height: 100%; display: block; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes sheetIn { from { transform: translateY(100%); } to { transform: none; } }
  @keyframes sheetDown { from { transform: translateY(-100%); } to { transform: none; } }
  @keyframes chatDot { 0%, 60%, 100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
  @keyframes splashRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes splashBar { from { width: 0; } to { width: 100%; } }
  @keyframes sklnShimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
  .skln { background: linear-gradient(90deg, var(--surface-subtle) 25%, color-mix(in oklch, var(--surface-subtle) 55%, white) 37%, var(--surface-subtle) 63%); background-size: 200% 100%; animation: sklnShimmer 1.3s ease-in-out infinite; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
